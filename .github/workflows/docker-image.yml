name: CI/CD Deploy VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Deploy via SSH na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Acessando diretório do projeto..."
            cd /caminho/do/seu/projeto

            echo "Atualizando código..."
            git pull origin main

            echo "Fazendo build da imagem..."
            docker build -t ${{ secrets.DOCKER_IMAGE_NAME }} .

            echo "Parando e removendo container antigo (se existir)..."
            docker stop ${{ secrets.DOCKER_IMAGE_NAME }} || true
            docker rm ${{ secrets.DOCKER_IMAGE_NAME }} || true

            echo "Subindo novo container..."
            docker run -d \
              --name ${{ secrets.DOCKER_IMAGE_NAME }} \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ secrets.DOCKER_IMAGE_NAME }}

            echo "Removendo imagens antigas..."
            docker image prune -f

            echo "Deploy concluído com sucesso!"
